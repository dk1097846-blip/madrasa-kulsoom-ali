<!DOCTYPE html>
<html>
<head>
<title>Student Registration</title>

<style>

body{
font-family:Arial;
background:linear-gradient(120deg,#0a7a3d,#1e9c52);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.box{
background:white;
padding:40px;
width:350px;
text-align:center;
border-radius:10px;
box-shadow:0 0 10px gray;
}

input{
width:100%;
padding:10px;
margin:8px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:12px;
background:#0a7a3d;
color:white;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#06612f;
}

</style>
</head>

<body>

<div class="box">

<h2>Student Registration</h2>

<form action="success.html">

<input type="text" placeholder="Full Name" required>

<input type="text" placeholder="Roll Number" required>

<input type="email" placeholder="Email" required>

<input type="password" placeholder="Password" required>

<button type="submit">Register</button>

</form>

</div>

</body>
</html>
